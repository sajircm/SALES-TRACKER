<!-- Firebase Modular SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBpofukhr90oqarAQ9qnep6T2l_Ds10sY",
  authDomain: "sales-tracker-3907c.firebaseapp.com",
  projectId: "sales-tracker-3907c",
  storageBucket: "sales-tracker-3907c.firebasestorage.app",
  messagingSenderId: "999347491349",
  appId: "1:999347491349:web:303716c0b6b3a0194a741c",
  measurementId: "G-4MJ9HHMDHB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
const ITEMS = {'TAX INVOICE':'invoice','JOB ORDER':'job','BUSINESS CARD':'card','FLYER':'flyer','STICKER':'sticker','OTHER':'other'};
let customItems = [];
let entries = [];
let currentUser = null;
let inlineEditingId = null;

window.loginWithGoogle = () => { signInWithPopup(auth, provider).catch(e => alert(e.message)); };
window.logoutFirebase = () => { signOut(auth); };

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('user-display').textContent = user.displayName;
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app-content').classList.remove('hidden');
    listenToDatabase();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app-content').classList.add('hidden');
  }
});

function listenToDatabase() {
  onSnapshot(collection(db, "users", currentUser.uid, "entries"), (snapshot) => {
    entries = [];
    snapshot.forEach((doc) => { entries.push({ id: doc.id, ...doc.data() }); });
    entries.sort((a,b) => new Date(b.date) - new Date(a.date));
    updateItemFilterOptions();
    renderAll();
  });
}

function updateItemFilterOptions() {
  const types = new Set(Object.keys(ITEMS));
  entries.forEach(e => { if(e.item) types.add(e.item); });
  const filterSel = document.getElementById('filter-type');
  const current = filterSel.value;
  filterSel.innerHTML = '<option value="">All Types</option>' + 
    Array.from(types).map(t => `<option value="${t}">${t}</option>`).join('');
  filterSel.value = current;
}

window.calcProfit = () => {
  const sell = parseFloat(document.getElementById('f-sell').value)||0;
  const cost = parseFloat(document.getElementById('f-cost').value)||0;
  const del = parseFloat(document.getElementById('f-delivery').value)||0;
  document.getElementById('profit-preview').textContent = (sell - cost - del).toFixed(2);
};
['f-sell','f-cost','f-delivery'].forEach(id => document.getElementById(id).addEventListener('input', window.calcProfit));

window.addEntry = async () => {
  const date = document.getElementById('f-date').value;
  const company = document.getElementById('f-company').value.trim().toUpperCase();
  const item = document.getElementById('f-item').value;
  const qty = parseFloat(document.getElementById('f-qty').value)||0;
  const cost = parseFloat(document.getElementById('f-cost').value)||0;
  const sell = parseFloat(document.getElementById('f-sell').value)||0;
  const delivery = parseFloat(document.getElementById('f-delivery').value)||0;
  const status = document.getElementById('f-status').value;
  
  if (!date || !company || !sell) { alert('Date, Company, and Selling Amount are required.'); return; }
  
  const id = "id_" + Date.now();
  await setDoc(doc(db, "users", currentUser.uid, "entries", id), {
    date, company, item, qty, cost, sell, delivery, status, profit: sell - cost - delivery
  });
  
  ['f-company','f-qty','f-cost','f-sell','f-delivery'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('profit-preview').textContent = '0.00';
};

// EXCEL IMPORT FUNCTION (ഫിക്സ് ചെയ്ത ഭാഗം)
window.handleImportFile = (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const firstSheetName = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[firstSheetName];
      
      // എക്സൽ ഷീറ്റിലെ വിവരങ്ങൾ JSON ലേക്ക് മാറ്റുന്നു
      const rawRows = XLSX.utils.sheet_to_json(worksheet);
      
      if (rawRows.length === 0) { alert('No data found in the Excel file.'); return; }

      let importedCount = 0;

      for (let row of rawRows) {
        // വലിയ അക്ഷരത്തിലോ ചെറിയ അക്ഷരത്തിലോ ഉള്ള ഹെഡിംഗുകൾ ഒരേപോലെ റീഡ് ചെയ്യാൻ വേണ്ടി
        const dateRaw = row.DATE || row.date || '';
        const companyRaw = row.COMPANY || row.company || row.customer || '';
        const itemRaw = row.ITEM || row.item || 'OTHER';
        const qtyRaw = row.QTY || row.qty || 0;
        const costRaw = row.COST || row.cost || 0;
        const sellRaw = row.SELLING || row.selling || row.amount || 0;
        const deliveryRaw = row.DELIVERY || row.delivery || 0;
        const statusRaw = (row.STATUS || row.status || 'PAID').toUpperCase();

        if (!dateRaw || !companyRaw || !sellRaw) continue;

        // '1000 CARD' പോലുള്ള ടെക്സ്റ്റുകളിൽ നിന്ന് സംഖ്യ മാത്രം വേർതിരിച്ചെടുക്കുന്നു
        let cleanQty = typeof qtyRaw === 'string' ? parseFloat(qtyRaw.replace(/[^0-9.]/g, '')) : parseFloat(qtyRaw);
        if (isNaN(cleanQty)) cleanQty = 0;

        const cleanCost = parseFloat(costRaw) || 0;
        const cleanSell = parseFloat(sellRaw) || 0;
        const cleanDelivery = parseFloat(deliveryRaw) || 0;
        
        // തീയതി ഫോർമാറ്റ് കൃത്യമാക്കാൻ (DD-MM-YY അല്ലെങ്കിൽ DD-MM-YYYY ആണെങ്കിൽ YYYY-MM-DD ലേക്ക് മാറ്റുന്നു)
        let formattedDate = dateRaw;
        if (typeof dateRaw === 'string' && dateRaw.includes('-')) {
          const parts = dateRaw.split('-');
          if (parts[0].length <= 2 && parts[2].length === 2) {
            formattedDate = `20${parts[2]}-${parts[1]}-${parts[0]}`; // e.g. 07-01-21 -> 2021-01-07
          } else if (parts[0].length <= 2 && parts[2].length === 4) {
            formattedDate = `${parts[2]}-${parts[1]}-${parts[0]}`; // e.g. 07-01-2021 -> 2021-01-07
          }
        }

        const id = "xl_" + Math.random().toString(36).substring(2, 9) + "_" + Date.now();
        
        // ഫയർബേസിലേക്ക് ഡാറ്റ സേവ് ചെയ്യുന്നു
        await setDoc(doc(db, "users", currentUser.uid, "entries", id), {
          date: formattedDate,
          company: companyRaw.trim().toUpperCase(),
          item: itemRaw.trim().toUpperCase(),
          qty: cleanQty,
          cost: cleanCost,
          sell: cleanSell,
          delivery: cleanDelivery,
          status: statusRaw === 'PENDING' ? 'PENDING' : 'PAID',
          profit: cleanSell - cleanCost - cleanDelivery
        });

        importedCount++;
      }

      alert(`Successfully imported ${importedCount} records!`);
      event.target.value = ''; // ഇൻപുട്ട് ക്ലിയർ ചെയ്യാൻ
    } catch (err) {
      console.error(err);
      alert('Error parsing Excel file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
};

window.startInlineEdit = (id) => {
  inlineEditingId = id;
  window.renderTable();
};

window.saveInlineEdit = async (id) => {
  const row = entries.find(e => e.id === id);
  const company = document.getElementById(`edit-comp-${id}`).value.trim().toUpperCase();
  const qty = parseFloat(document.getElementById(`edit-qty-${id}`).value)||0;
  const cost = document.getElementById(`edit-cost-${id}`) ? (parseFloat(document.getElementById(`edit-cost-${id}`).value)||0) : (row.cost || 0);
  const sell = parseFloat(document.getElementById(`edit-sell-${id}`).value)||0;
  const delivery = document.getElementById(`edit-del-${id}`) ? (parseFloat(document.getElementById(`edit-del-${id}`).value)||0) : (row.delivery || 0);
  const status = document.getElementById(`edit-status-${id}`).value;

  if(!company || !sell) { alert('Fields cannot be empty'); return; }

  await setDoc(doc(db, "users", currentUser.uid, "entries", id), {
    ...row, company, qty, cost, sell, delivery, status, profit: sell - cost - delivery
  });
  inlineEditingId = null;
};

window.cancelInlineEdit = () => {
  inlineEditingId = null;
  window.renderTable();
};

window.deleteEntry = async (id) => {
  if (confirm('Delete this entry?')) await deleteDoc(doc(db, "users", currentUser.uid, "entries", id));
};

window.renderTable = () => {
  const search = document.getElementById('filter-search').value.toLowerCase();
  const statusFilter = document.getElementById('filter-status').value;
  const typeFilter = document.getElementById('filter-type').value;
  
  const filtered = entries.filter(e => {
    if (search && !e.company.toLowerCase().includes(search)) return false;
    if (statusFilter && e.status !== statusFilter) return false;
    if (typeFilter && e.item !== typeFilter) return false;
    return true;
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map(e => {
    const isEditing = inlineEditingId === e.id;
    const itemClass = ITEMS[e.item] || 'other';
    if (isEditing) {
      return `
        <tr>
          <td>${e.date}</td>
          <td><input type="text" id="edit-comp-${e.id}" class="edit-input" value="${e.company}"></td>
          <td>${e.item}</td>
          <td><input type="number" id="edit-qty-${e.id}" class="edit-input" value="${e.qty}"></td>
          <td><input type="number" id="edit-cost-${e.id}" class="edit-input" value="${e.cost}"></td>
          <td><input type="number" id="edit-sell-${e.id}" class="edit-input" value="${e.sell}"></td>
          <td><input type="number" id="edit-del-${e.id}" class="edit-input" value="${e.delivery}"></td>
          <td>
            <select id="edit-status-${e.id}" class="edit-input">
              <option value="PAID" ${e.status==='PAID'?'selected':''}>Paid</option>
              <option value="PENDING" ${e.status==='PENDING'?'selected':''}>Pending</option>
            </select>
          </td>
          <td class="profit-cell">${e.profit.toFixed(2)}</td>
          <td>
            <button class="btn-del" onclick="saveInlineEdit('${e.id}')" style="color:var(--green)"><i class="ti ti-check"></i></button>
            <button class="btn-del" onclick="cancelInlineEdit()"><i class="ti ti-x"></i></button>
          </td>
        </tr>`;
    }

    return `
      <tr>
        <td>${e.date}</td>
        <td><b>${e.company}</b></td>
        <td><span class="badge badge-${itemClass}">${e.item}</span></td>
        <td>${(e.qty||0).toLocaleString()}</td>
        <td>${(e.cost||0).toFixed(2)}</td>
        <td>${(e.sell||0).toFixed(2)}</td>
        <td>${(e.delivery||0).toFixed(2)}</td>
        <td><span class="badge badge-${(e.status||'PAID').toLowerCase()}">${e.status||'PAID'}</span></td>
        <td class="profit-cell">${(e.profit||0).toFixed(2)}</td>
        <td>
          <button class="btn-del" onclick="startInlineEdit('${e.id}')"><i class="ti ti-edit"></i></button>
          <button class="btn-del" onclick="deleteEntry('${e.id}')"><i class="ti ti-trash"></i></button>
        </td>
      </tr>`;
  }).join('');
};

function calculateAnalytics() {
  if (!entries.length) return;
  
  const clientMap = {};
  const productMap = {};
  
  entries.forEach(e => {
    clientMap[e.company] = (clientMap[e.company]||0) + e.profit;
    productMap[e.item] = (productMap[e.item]||0) + e.qty;
  });
  
  const topClient = Object.keys(clientMap).reduce((a, b) => clientMap[a] > clientMap[b] ? a : b, "None");
  const topProduct = Object.keys(productMap).reduce((a, b) => productMap[a] > productMap[b] ? a : b, "None");
  
  document.getElementById('analytics-client').innerHTML = topClient !== "None" ? `${topClient} <span style="color:var(--green);font-size:12px;">(Profit: AED ${clientMap[topClient].toFixed(2)})</span>` : "No data";
  document.getElementById('analytics-product').innerHTML = topProduct !== "None" ? `${topProduct} <span style="color:var(--text-secondary);font-size:12px;">(Qty: ${productMap[topProduct].toLocaleString()})</span>` : "No data";
}

function updateStats() {
  let rev = 0, cost = 0, del = 0, prof = 0, pending = 0;
  entries.forEach(e => {
    rev += e.sell; cost += e.cost; del += e.delivery; prof += e.profit;
    if (e.status === 'PENDING') pending += e.sell;
  });
  document.getElementById('stat-revenue').textContent = rev.toFixed(2);
  document.getElementById('stat-cost').textContent = cost.toFixed(2);
  document.getElementById('stat-pending').textContent = pending.toFixed(2);
  document.getElementById('stat-profit').textContent = prof.toFixed(2);
  document.getElementById('record-count').textContent = entries.length + ' records';
}

function renderMonthly() {
  const map = {};
  entries.forEach(e => {
    if (!e.date) return;
    const [y, m] = e.date.split('-');
    if (!m || !y) return;
    const key = y + '-' + parseInt(m);
    if (!map[key]) map[key] = { year: y, month: parseInt(m), profit: 0, count: 0 };
    map[key].profit += e.profit;
    map[key].count++;
  });
  
  const el = document.getElementById('month-grid');
  const keys = Object.keys(map).sort();
  if(!keys.length) { el.innerHTML = '<div class="empty-msg">No entries recorded.</div>'; return; }
  
  el.innerHTML = keys.map(k => `
    <div class="month-card">
      <div class="month-top">
        <div>
          <div class="month-name">${MONTHS[map[k].month]} ${map[k].year}</div>
          <div class="month-meta">${map[k].count} orders</div>
        </div>
        <div class="month-profit">${map[k].profit.toFixed(2)}</div>
      </div>
    </div>
  `).join('');
}

let chartObj = null;
function renderChart() {
  const map = {};
  entries.forEach(e => {
    if(!e.date) return;
    const [y, m] = e.date.split('-');
    const key = y + '-' + m;
    map[key] = (map[key]||0) + e.profit;
  });
  const keys = Object.keys(map).sort();
  const ctx = document.getElementById('profit-chart');
  if (!ctx) return;
  if (chartObj) chartObj.destroy();
  chartObj = new Chart(ctx, {
    type: 'line',
    data: {
      labels: keys.map(k => k),
      datasets: [{ data: keys.map(k => map[k]), borderColor: '#1D9E75', tension: 0.2, fill: false }]
    },
    options: { plugins: { legend: { display: false } } }
  });
}

window.switchTab = (name) => {
  document.getElementById('tab-dashboard').classList.toggle('active', name==='dashboard');
  document.getElementById('tab-reports').classList.toggle('active', name==='reports');
  document.getElementById('tab-btn-dashboard').classList.toggle('active', name==='dashboard');
  document.getElementById('tab-btn-reports').classList.toggle('active', name==='reports');
  if (name === 'reports') { renderChart(); renderMonthly(); calculateAnalytics(); }
};

window.handleItemSelect = () => {
  const sel = document.getElementById('f-item');
  if (sel.value !== '__add__') return;
  const name = (prompt('Enter custom product/item name:')||'').trim().toUpperCase();
  if (name) {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.insertBefore(opt, sel.lastChild);
    sel.value = name;
  } else { sel.value = 'OTHER'; }
};

function renderAll() { updateStats(); window.renderTable(); calculateAnalytics(); }
</script>
